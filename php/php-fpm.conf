; PHP-FPM pool settings for 1GB RAM Lightsail
[www]
pm = dynamic
pm.max_children = 5
listen.backlog = 512
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500
pm.status_path = /status
php_admin_value[memory_limit] = 96M
php_admin_value[max_execution_time] = 30
php_admin_value[max_input_time] = 30

; Connection pooling - Conservative
php_admin_value[mysqli.allow_persistent] = On
php_admin_value[mysqli.max_persistent] = 5
